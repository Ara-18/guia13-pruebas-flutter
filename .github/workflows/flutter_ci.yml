name: Flutter CI - Control de Calidad

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-coverage:
    name: Pruebas y Cobertura
    runs-on: ubuntu-latest

    steps:
      - name: Clonar el repositorio
        uses: actions/checkout@v4

      - name: Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Instalar dependencias
        run: flutter pub get

      - name: Instalar lcov
        run: sudo apt-get update && sudo apt-get install -y lcov

      - name: Dar permisos de ejecución al script
        run: chmod +x scripts/check_coverage.sh

      - name: Ejecutar pruebas y validar cobertura mínima
        run: ./scripts/check_coverage.sh